<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Logs | Nexus AI</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Logs Specific Layout using the new CSS variables */
    .logs-page {
      background: var(--bg-app);
      min-height: 100vh;
      overflow-y: auto;
    }
    .logs-header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(13, 13, 15, 0.8); backdrop-filter: blur(12px);
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color);
      display: flex; justify-content: space-between; align-items: center;
    }
    .logs-header h1 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
    
    .back-link {
      font-size: 14px; color: var(--text-secondary); text-decoration: none; font-weight: 500;
      display: flex; align-items: center; gap: 0.5rem; transition: color var(--transition);
      background: var(--bg-panel); padding: 8px 16px; border-radius: var(--radius-full);
      border: 1px solid var(--border-color);
    }
    .back-link:hover { color: var(--text-primary); background: var(--bg-hover); }
    
    .logs-container {
      max-width: 900px; margin: 2rem auto; padding: 0 1.5rem 4rem;
      display: flex; flex-direction: column; gap: 1.5rem;
    }
    
    .log-card {
      background: var(--bg-sidebar); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: transform var(--transition);
    }
    .log-card:hover { transform: translateY(-2px); border-color: var(--text-muted); }
    
    .log-meta {
      display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;
      margin-bottom: 1.25rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;
    }
    
    .log-user { font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .log-user .avatar-sm { width: 24px; height: 24px; background: var(--accent-gradient); border-radius: 50%; display: inline-block; }
    .log-time { color: var(--text-muted); font-size: 13px; margin-left: auto; }
    .log-model { 
      background: rgba(99, 102, 241, 0.1); color: var(--accent-color); 
      padding: 4px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 600; border: 1px solid rgba(99, 102, 241, 0.2);
    }
    
    .log-stats {
      display: flex; flex-wrap: wrap; gap: 1.5rem; font-size: 13px; color: var(--text-secondary);
      background: var(--bg-input); padding: 0.75rem 1.25rem; border-radius: var(--radius-md); margin-bottom: 1.5rem;
    }
    .log-stats strong { color: var(--text-primary); font-weight: 600; }
    
    .log-content { display: flex; flex-direction: column; gap: 1.25rem; }
    .log-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 0.5rem; }
    .log-text { 
      font-size: 14px; color: var(--text-primary); white-space: pre-wrap; line-height: 1.6; 
      background: var(--bg-app); padding: 1.25rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); font-family: monospace;
    }
  </style>
</head>
<body class="logs-page">
  <header class="logs-header">
    <h1>System Logs</h1>
    <a href="./chat.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Return to Workspace
    </a>
  </header>

  <div class="logs-container" id="logs-container">
    <p style="text-align:center; color: var(--text-muted); margin-top: 4rem; font-size: 15px;">Loading system logs...</p>
  </div>

  <script type="module">
    import { api } from './api.js'
    import { auth } from './auth.js'

    if (!auth.isLoggedIn()) window.location.href = './login.html'

    const container = document.getElementById('logs-container')

    async function loadLogs() {
      try {
        const logs = await api.getLogs()
        container.innerHTML = ''
        
        if (!logs || logs.length === 0) {
          container.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top: 4rem; font-size: 15px;">No logs found for this account.</p>'
          return
        }

        logs.forEach(log => {
          const card = document.createElement('div')
          card.className = 'log-card'

          const date = new Date(log.created_at || Date.now()).toLocaleString()

          card.innerHTML = `
            <div class="log-meta">
              <span class="log-user"><span class="avatar-sm"></span> ${log.username || 'User'}</span>
              <span class="log-model">${log.model || 'Unknown Model'}</span>
              <span class="log-time">${date}</span>
            </div>
            <div class="log-stats">
              <span>Prompt: <strong>${log.prompt_tokens || 0}</strong></span>
              <span>Response: <strong>${log.response_tokens || 0}</strong></span>
              <span>Total: <strong>${log.total_tokens || 0}</strong></span>
              <span>Time: <strong>${log.duration_ms || 0} ms</strong></span>
            </div>
            <div class="log-content">
              <div>
                <div class="log-section-title">Prompt</div>
                <div class="log-text">${log.prompt || 'N/A'}</div>
              </div>
              <div>
                <div class="log-section-title">Response</div>
                <div class="log-text">${log.response || 'N/A'}</div>
              </div>
            </div>
          `
          container.appendChild(card)
        })
      } catch (err) {
        container.innerHTML = `<p style="text-align:center; color: var(--danger); margin-top: 4rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2);">Error loading logs: ${err.message}</p>`
      }
    }

    loadLogs()
  </script>
</body>
</html>
