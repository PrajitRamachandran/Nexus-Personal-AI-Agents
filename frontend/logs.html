<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observability Dashboard | Nexus AI</title>
  <meta name="description" content="LLM performance monitoring: latency, TTFT, tokens/sec and more.">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:  #22c55e;
      --yellow: #eab308;
      --blue:   #3b82f6;
      --purple: #a855f7;
      --orange: #f97316;
      --red:    #ef4444;
      --teal:   #14b8a6;
    }

    body { font-family: 'Inter', system-ui, sans-serif; }

    /* ── Layout ── */
    .obs-page  { min-height: 100vh; background: var(--bg-app); }

    .obs-header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(13,13,15,0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .obs-header-left  { display: flex; align-items: center; gap: 12px; }
    .obs-title        { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .obs-badge        { font-size: 11px; font-weight: 700; background: rgba(99,102,241,0.15);
                        color: var(--accent-color); padding: 3px 10px; border-radius: 999px;
                        border: 1px solid rgba(99,102,241,0.3); letter-spacing: 0.5px; text-transform: uppercase; }
    .back-link {
      font-size: 13px; color: var(--text-secondary); text-decoration: none; font-weight: 500;
      display: flex; align-items: center; gap: 6px; padding: 7px 14px;
      background: var(--bg-panel); border: 1px solid var(--border-color);
      border-radius: 999px; transition: all 0.2s ease;
    }
    .back-link:hover { color: var(--text-primary); background: var(--bg-hover); }

    .obs-body { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

    /* ── Stat Cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-sidebar); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 1.25rem 1.25rem 1rem;
      display: flex; flex-direction: column; gap: 0.4rem;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card:hover { border-color: var(--text-muted); transform: translateY(-2px); }
    .stat-icon { font-size: 18px; margin-bottom: 2px; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--text-primary); line-height: 1; font-variant-numeric: tabular-nums; }
    .stat-unit  { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* ── Section title ── */
    .section-title {
      font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
    }
    .filter-bar input {
      flex: 1; min-width: 200px; padding: 0.6rem 1rem;
      background: var(--bg-input); border: 1px solid var(--border-color);
      border-radius: 999px; color: var(--text-primary); font-size: 13px; font-family: inherit;
      transition: border-color 0.2s;
    }
    .filter-bar input:focus { outline: none; border-color: var(--accent-color); }
    .filter-bar input::placeholder { color: var(--text-muted); }

    .filter-count {
      font-size: 12px; color: var(--text-muted); white-space: nowrap;
    }

    /* ── Log Cards ── */
    .log-list { display: flex; flex-direction: column; gap: 1rem; }

    .log-card {
      background: var(--bg-sidebar); border: 1px solid var(--border-color);
      border-radius: 16px; overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .log-card:hover { border-color: #3f3f46; transform: translateY(-1px); }
    .log-card.has-error { border-color: rgba(239,68,68,0.3); }

    .log-top {
      padding: 1rem 1.25rem; display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem;
      border-bottom: 1px solid var(--border-color);
    }
    .log-user { font-weight: 600; font-size: 13px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
    .avatar-xs {
      width: 22px; height: 22px; border-radius: 50%; background: var(--accent-gradient);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .log-model-badge {
      background: rgba(99,102,241,0.12); color: var(--accent-color);
      padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
      border: 1px solid rgba(99,102,241,0.25); font-family: 'JetBrains Mono', monospace;
    }
    .error-badge {
      background: rgba(239,68,68,0.1); color: var(--red);
      padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
      border: 1px solid rgba(239,68,68,0.25);
    }
    .log-time { margin-left: auto; font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* ── Metrics row ── */
    .metrics-row {
      display: flex; flex-wrap: wrap; gap: 0; background: var(--bg-input);
      border-bottom: 1px solid var(--border-color);
    }
    .metric-cell {
      flex: 1; min-width: 110px; padding: 0.7rem 1.1rem;
      border-right: 1px solid var(--border-color);
      display: flex; flex-direction: column; gap: 2px;
    }
    .metric-cell:last-child { border-right: none; }
    .metric-name  { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); }
    .metric-val   {
      font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums;
      font-family: 'JetBrains Mono', monospace;
    }
    .metric-sub   { font-size: 10px; color: var(--text-muted); }

    /* ── Ollama internals accordion ── */
    .internals-toggle {
      display: flex; align-items: center; gap: 8px; padding: 0.6rem 1.25rem;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer; font-size: 12px; color: var(--text-muted);
      background: none; border-top: none; border-left: none; border-right: none;
      width: 100%; text-align: left; font-family: inherit; transition: color 0.15s;
    }
    .internals-toggle:hover { color: var(--text-secondary); }
    .internals-panel { display: none; background: rgba(0,0,0,0.2); }
    .internals-panel.open { display: block; }
    .internals-grid {
      display: flex; flex-wrap: wrap; gap: 0;
      padding: 0.75rem 1.25rem; gap: 1.25rem;
    }
    .internal-item { display: flex; flex-direction: column; gap: 2px; }
    .internal-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .internal-val   { font-size: 14px; font-weight: 600; color: var(--text-secondary);
                      font-family: 'JetBrains Mono', monospace; }

    /* ── Prompt / Response ── */
    .log-content { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .convo-block { display: flex; flex-direction: column; gap: 0.4rem; }
    .convo-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
    .convo-text  {
      font-size: 13px; line-height: 1.6; color: var(--text-secondary); white-space: pre-wrap;
      background: var(--bg-app); padding: 0.85rem 1rem;
      border-radius: 10px; border: 1px solid var(--border-color);
      max-height: 120px; overflow-y: auto;
    }
    .convo-text.expanded { max-height: none; }
    .expand-btn {
      font-size: 11px; color: var(--accent-color); background: none; border: none;
      cursor: pointer; padding: 0; text-align: left; font-family: inherit; margin-top: 2px;
    }
    .expand-btn:hover { text-decoration: underline; }

    /* ── Non-admin view ── */
    .info-banner {
      display: flex; align-items: center; gap: 12px;
      background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 2rem;
      font-size: 13px; color: var(--text-secondary);
    }
    .info-banner svg { flex-shrink: 0; color: var(--accent-color); }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-size: 15px;
    }
    .loading-dots::after { content: '...'; animation: dots 1.2s steps(3, end) infinite; }
    @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }

    /* ── Color utilities ── */
    .c-green  { color: var(--green); }
    .c-yellow { color: var(--yellow); }
    .c-blue   { color: var(--blue); }
    .c-purple { color: var(--purple); }
    .c-orange { color: var(--orange); }
    .c-red    { color: var(--red); }
    .c-teal   { color: var(--teal); }
    .c-muted  { color: var(--text-muted); }
  </style>
</head>
<body class="obs-page">

  <header class="obs-header">
    <div class="obs-header-left">
      <span class="obs-title">Observability Dashboard</span>
      <span class="obs-badge" id="access-badge">Loading…</span>
    </div>
    <a href="./chat.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Chat
    </a>
  </header>

  <div class="obs-body" id="obs-body">
    <div class="empty-state"><span class="loading-dots">Loading</span></div>
  </div>

  <script type="module">
    import { api } from './api.js'
    import { auth } from './auth.js'

    if (!auth.isLoggedIn()) window.location.href = './login.html'

    const body   = document.getElementById('obs-body')
    const badge  = document.getElementById('access-badge')

    // ── Formatters ──
    const fmt = {
      ms:   v => v != null ? `${Number(v).toLocaleString()} ms` : '—',
      num:  v => v != null ? Number(v).toLocaleString() : '—',
      dec:  v => v != null ? Number(v).toFixed(1) : '—',
      date: v => {
        if (!v) return '—'
        const d = new Date(v)
        return d.toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })
      },
      trunc: (s, n = 200) => s ? (s.length > n ? s.slice(0, n) + '…' : s) : '—',
    }

    // ── Metric colour by value range ──
    function ttftColor(ms) {
      if (ms == null) return 'c-muted'
      if (ms < 500)  return 'c-green'
      if (ms < 1500) return 'c-yellow'
      return 'c-red'
    }
    function tpsColor(tps) {
      if (tps == null) return 'c-muted'
      if (tps > 20)  return 'c-green'
      if (tps > 8)   return 'c-yellow'
      return 'c-orange'
    }
    function wallColor(ms) {
      if (ms == null) return 'c-muted'
      if (ms < 3000)  return 'c-green'
      if (ms < 8000)  return 'c-yellow'
      return 'c-red'
    }

    // ── Stat card helper ──
    function statCard({ icon, label, value, unit, colorClass = '' }) {
      return `
        <div class="stat-card">
          <div class="stat-icon">${icon}</div>
          <div class="stat-label">${label}</div>
          <div class="stat-value ${colorClass}">${value}</div>
          ${unit ? `<div class="stat-unit">${unit}</div>` : ''}
        </div>`
    }

    // ── Single metric cell ──
    function metricCell(name, val, colorClass = '', sub = '') {
      return `
        <div class="metric-cell">
          <div class="metric-name">${name}</div>
          <div class="metric-val ${colorClass}">${val}</div>
          ${sub ? `<div class="metric-sub">${sub}</div>` : ''}
        </div>`
    }

    // ── Expand behaviour ──
    function bindExpand(container) {
      container.querySelectorAll('.expand-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = btn.previousElementSibling
          target.classList.toggle('expanded')
          btn.textContent = target.classList.contains('expanded') ? 'Show less' : 'Show more'
        })
      })
      container.querySelectorAll('.internals-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const panel = btn.nextElementSibling
          panel.classList.toggle('open')
          const arrow = btn.querySelector('.arrow')
          if (arrow) arrow.textContent = panel.classList.contains('open') ? '▲' : '▼'
        })
      })
    }

    // ── Filter logic ──
    function bindFilter(allCards) {
      const input = document.getElementById('log-filter')
      const count = document.getElementById('filter-count')
      if (!input) return

      function applyFilter() {
        const q = input.value.toLowerCase().trim()
        let visible = 0
        allCards.forEach(card => {
          const text = card.dataset.search || ''
          const show = !q || text.includes(q)
          card.style.display = show ? '' : 'none'
          if (show) visible++
        })
        count.textContent = `${visible} of ${allCards.length} entries`
      }

      input.addEventListener('input', applyFilter)
      applyFilter()
    }

    // ── Build one log card ──
    function buildLogCard(log) {
      const card = document.createElement('div')
      card.className = 'log-card' + (log.error ? ' has-error' : '')
      card.dataset.search = [log.username, log.model, log.user_message, log.assistant_reply]
        .filter(Boolean).join(' ').toLowerCase()

      const initials = (log.username || 'U').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase()

      const errorBadge = log.error
        ? `<span class="error-badge">Error</span>`
        : ''

      card.innerHTML = `
        <div class="log-top">
          <span class="log-user">
            <span class="avatar-xs">${initials}</span>
            ${log.username || 'Unknown'}
          </span>
          <span class="log-model-badge">${log.model || '—'}</span>
          ${errorBadge}
          <span class="log-time">${fmt.date(log.created_at)}</span>
        </div>

        <div class="metrics-row">
          ${metricCell('Prompt Tokens',   fmt.num(log.prompt_tokens),   'c-blue')}
          ${metricCell('Response Tokens', fmt.num(log.response_tokens), 'c-purple')}
          ${metricCell('Total Tokens',    fmt.num(log.total_tokens),    'c-teal')}
          ${metricCell('TTFT',            fmt.ms(log.time_to_first_token_ms), ttftColor(log.time_to_first_token_ms), 'time to first token')}
          ${metricCell('Wall Latency',    fmt.ms(log.total_wall_ms),    wallColor(log.total_wall_ms), 'end-to-end')}
          ${metricCell('Tokens / sec',    fmt.dec(log.tokens_per_second), tpsColor(log.tokens_per_second))}
          ${metricCell('Context',         fmt.num(log.context_length),  'c-muted', 'messages')}
          ${metricCell('Reply Length',    fmt.num(log.response_chars),  'c-muted', 'chars')}
        </div>

        <button class="internals-toggle">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 1 0 4.93 19.07 10 10 0 0 0 19.07 4.93z"/>
          </svg>
          Ollama internals
          <span class="arrow" style="margin-left:auto">▼</span>
        </button>
        <div class="internals-panel">
          <div class="internals-grid">
            <div class="internal-item">
              <span class="internal-label">Model Load</span>
              <span class="internal-val">${fmt.ms(log.ollama_load_ms)}</span>
            </div>
            <div class="internal-item">
              <span class="internal-label">Prompt Eval</span>
              <span class="internal-val">${fmt.ms(log.ollama_prompt_eval_ms)}</span>
            </div>
            <div class="internal-item">
              <span class="internal-label">Token Gen</span>
              <span class="internal-val">${fmt.ms(log.ollama_eval_ms)}</span>
            </div>
            <div class="internal-item">
              <span class="internal-label">Gen Duration (Ollama)</span>
              <span class="internal-val">${fmt.ms(log.duration_ms)}</span>
            </div>
          </div>
        </div>

        <div class="log-content">
          ${log.error ? `
          <div class="convo-block">
            <div class="convo-label" style="color:var(--red)">Error</div>
            <div class="convo-text" style="border-color:rgba(239,68,68,0.3); color:var(--red)">${log.error}</div>
          </div>` : ''}
          <div class="convo-block">
            <div class="convo-label">Prompt</div>
            <div class="convo-text">${log.user_message ? log.user_message.replace(/</g,'&lt;') : '—'}</div>
            ${(log.user_message || '').length > 300 ? `<button class="expand-btn">Show more</button>` : ''}
          </div>
          <div class="convo-block">
            <div class="convo-label">Response</div>
            <div class="convo-text">${log.assistant_reply ? log.assistant_reply.replace(/</g,'&lt;') : '—'}</div>
            ${(log.assistant_reply || '').length > 300 ? `<button class="expand-btn">Show more</button>` : ''}
          </div>
        </div>
      `
      return card
    }

    // ── ADMIN RENDER ──
    function renderAdmin(data) {
      badge.textContent = 'Admin'
      badge.style.background = 'rgba(34,197,94,0.15)'
      badge.style.color = 'var(--green)'
      badge.style.borderColor = 'rgba(34,197,94,0.3)'

      const s = data.stats || {}
      const errRate = s.total_requests
        ? ((s.error_count / s.total_requests) * 100).toFixed(1)
        : '0.0'

      const statsHtml = `
        <div class="stat-grid">
          ${statCard({ icon:'📊', label:'Total Requests',    value: fmt.num(s.total_requests),         unit:'all time' })}
          ${statCard({ icon:'⚡', label:'Avg TTFT',          value: s.avg_ttft_ms != null ? Math.round(s.avg_ttft_ms) : '—', unit:'ms', colorClass: ttftColor(s.avg_ttft_ms) })}
          ${statCard({ icon:'🚀', label:'Avg Tokens / sec',  value: s.avg_tokens_per_second != null ? Number(s.avg_tokens_per_second).toFixed(1) : '—', colorClass: tpsColor(s.avg_tokens_per_second) })}
          ${statCard({ icon:'🕐', label:'Avg Wall Latency',  value: s.avg_wall_ms != null ? Math.round(s.avg_wall_ms) : '—', unit:'ms', colorClass: wallColor(s.avg_wall_ms) })}
          ${statCard({ icon:'🔤', label:'Total Tokens Used', value: fmt.num(s.total_tokens_consumed),  unit:'tokens' })}
          ${statCard({ icon:'⚠️', label:'Error Rate',        value: `${errRate}%`,                     colorClass: parseFloat(errRate) > 5 ? 'c-red' : 'c-green' })}
        </div>`

      const filterHtml = `
        <div class="section-title">All Requests</div>
        <div class="filter-bar">
          <input id="log-filter" type="search" placeholder="Filter by user, model, prompt…">
          <span class="filter-count" id="filter-count"></span>
        </div>`

      body.innerHTML = statsHtml + filterHtml + '<div class="log-list" id="log-list"></div>'

      const list   = document.getElementById('log-list')
      const cards  = []

      if (!data.logs || data.logs.length === 0) {
        list.innerHTML = '<div class="empty-state">No logs yet. Send a message to generate the first entry.</div>'
      } else {
        data.logs.forEach(log => {
          const card = buildLogCard(log)
          list.appendChild(card)
          cards.push(card)
        })
        bindExpand(list)
        bindFilter(cards)
      }
    }

    // ── NON-ADMIN RENDER ──
    function renderUser(data) {
      badge.textContent = 'User View'

      body.innerHTML = `
        <div class="info-banner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Full observability is available to admins only. Here is your most recent request.
        </div>
        <div class="section-title">Your Last Request</div>
        <div id="user-log-container"></div>`

      const container = document.getElementById('user-log-container')

      if (!data.log) {
        container.innerHTML = '<div class="empty-state">No requests yet. Start chatting to see your stats here.</div>'
        return
      }

      const log = data.log
      // Build a simplified version
      const card = document.createElement('div')
      card.className = 'log-card'
      card.innerHTML = `
        <div class="log-top">
          <span class="log-model-badge">${log.model || '—'}</span>
          <span class="log-time">${fmt.date(log.created_at)}</span>
        </div>
        <div class="metrics-row">
          ${metricCell('Prompt Tokens',   fmt.num(log.prompt_tokens),   'c-blue')}
          ${metricCell('Response Tokens', fmt.num(log.response_tokens), 'c-purple')}
          ${metricCell('Total Tokens',    fmt.num(log.total_tokens),    'c-teal')}
          ${metricCell('TTFT',            fmt.ms(log.time_to_first_token_ms), ttftColor(log.time_to_first_token_ms), 'time to first token')}
          ${metricCell('Wall Latency',    fmt.ms(log.total_wall_ms),    wallColor(log.total_wall_ms))}
          ${metricCell('Tokens / sec',    fmt.dec(log.tokens_per_second), tpsColor(log.tokens_per_second))}
        </div>
        <div class="log-content">
          <div class="convo-block">
            <div class="convo-label">Your Prompt</div>
            <div class="convo-text">${(log.user_message || '—').replace(/</g,'&lt;')}</div>
          </div>
          <div class="convo-block">
            <div class="convo-label">AI Response</div>
            <div class="convo-text">${(log.assistant_reply || '—').replace(/</g,'&lt;')}</div>
          </div>
        </div>`
      container.appendChild(card)
      bindExpand(container)
    }

    // ── MAIN ──
    async function init() {
      try {
        const data = await api.getLogs()
        if (data.admin) {
          renderAdmin(data)
        } else {
          renderUser(data)
        }
      } catch (err) {
        body.innerHTML = `
          <div class="empty-state" style="color:var(--red)">
            Failed to load logs: ${err.message}
          </div>`
      }
    }

    init()
  </script>
</body>
</html>
