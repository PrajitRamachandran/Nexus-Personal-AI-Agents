<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nexus AI — Your intelligent AI workspace with persistent memory">
  <title>Nexus AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="chat-page">

  <div class="app">

    <div class="sidebar">
      <div class="sidebar-header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="24" y2="24">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        Nexus AI
      </div>

      <button id="new-chat-btn">New Chat</button>

      <div class="sidebar-search">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
        </svg>
        <input id="conversation-search" type="search" placeholder="Search chats">
      </div>

      <div id="conversation-list"></div>

      <div class="sidebar-footer">
        <div class="user-profile">
          <span id="username-display"><span class="avatar-sm"></span>User</span>
          <button id="logout-btn">Sign out</button>
        </div>

        <!-- Memory Panel Toggle -->
        <button id="memory-toggle-btn" class="memory-toggle-btn" title="View long-term memory">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
          </svg>
          Memory
          <span id="memory-count-badge" class="memory-count-badge hidden">0</span>
        </button>

        <div class="app-version">Nexus AI v1.1.0</div>
      </div>
    </div>

    <!-- Memory Panel (slide-in over sidebar content area) -->
    <div id="memory-panel" class="memory-panel hidden">
      <div class="memory-panel-header">
        <div class="memory-panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
          </svg>
          Long-term Memory
        </div>
        <button id="memory-close-btn" class="memory-close-btn" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="memory-panel-desc">
        Facts Nexus remembers about you across all conversations.
      </div>
      <div id="memory-list" class="memory-list"></div>
    </div>

    <div class="main">
      <header class="chat-header">
        <span class="header-title" id="current-chat-title">Current Conversation</span>
        <a href="./logs.html" class="logs-link">View Logs</a>
      </header>

      <div id="messages" class="messages">
        <div id="empty-hint" class="empty-hint">
          <h1>Nexus AI</h1>
          <p>Your intelligent AI workspace</p>
        </div>
      </div>

      <div class="input-area-wrapper">
        <div id="stats-bar" class="stats-bar hidden"></div>
        <div class="input-row">
          <textarea id="input" placeholder="Message Nexus AI... (Shift+Enter for newline)" rows="1"></textarea>
          <button id="send-btn" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { api } from './api.js'
    import { auth } from './auth.js'

    if (!auth.isLoggedIn()) window.location.href = './login.html'

    const messagesEl      = document.getElementById('messages')
    const inputEl         = document.getElementById('input')
    const sendBtn         = document.getElementById('send-btn')
    const emptyHint       = document.getElementById('empty-hint')
    const statsBar        = document.getElementById('stats-bar')
    const usernameEl      = document.getElementById('username-display')
    const logoutBtn       = document.getElementById('logout-btn')
    const convoList       = document.getElementById('conversation-list')
    const newChatBtn      = document.getElementById('new-chat-btn')
    const searchEl        = document.getElementById('conversation-search')
    const currentChatTitle = document.getElementById('current-chat-title')
    const memoryToggleBtn = document.getElementById('memory-toggle-btn')
    const memoryPanel     = document.getElementById('memory-panel')
    const memoryCloseBtn  = document.getElementById('memory-close-btn')
    const memoryList      = document.getElementById('memory-list')
    const memoryCountBadge = document.getElementById('memory-count-badge')

    let currentConversationId = null
    let searchTimer = null
    let activeSearchQuery = ''

    // ─── Username ────────────────────────────────────────────────────────────
    usernameEl.innerHTML = `<span class="avatar-sm"></span> ${auth.getUsername()}`

    logoutBtn.addEventListener('click', () => {
      auth.logout()
      window.location.href = './login.html'
    })

    // ─── Input handlers ──────────────────────────────────────────────────────
    sendBtn.addEventListener('click', () => void sendMessage())
    newChatBtn.addEventListener('click', () => void createNewConversation())
    searchEl.addEventListener('input', () => {
      window.clearTimeout(searchTimer)
      searchTimer = window.setTimeout(() => {
        activeSearchQuery = searchEl.value.trim()
        if (activeSearchQuery) {
          void searchConversations(activeSearchQuery)
        } else {
          void loadConversations()
        }
      }, 180)
    })

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        void sendMessage()
      }
    })
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto'
      inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px'
    })

    document.addEventListener('click', () => {
      document.querySelectorAll('.dropdown').forEach(d => d.classList.add('hidden'))
    })

    // ─── Memory Panel ─────────────────────────────────────────────────────────
    memoryToggleBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      const isHidden = memoryPanel.classList.contains('hidden')
      if (isHidden) {
        memoryPanel.classList.remove('hidden')
        requestAnimationFrame(() => memoryPanel.classList.add('open'))
        loadMemoryPanel()
      } else {
        closeMemoryPanel()
      }
    })

    memoryCloseBtn.addEventListener('click', closeMemoryPanel)

    function closeMemoryPanel() {
      memoryPanel.classList.remove('open')
      setTimeout(() => memoryPanel.classList.add('hidden'), 250)
    }

    async function loadMemoryPanel() {
      memoryList.innerHTML = `<div class="memory-loading">Loading memories…</div>`
      try {
        const { memories } = await api.getMemory()
        renderMemoryList(memories)
      } catch {
        memoryList.innerHTML = `<div class="memory-empty">Failed to load memories.</div>`
      }
    }

    function renderMemoryList(memories) {
      // Update count badge
      if (memories.length > 0) {
        memoryCountBadge.textContent = memories.length
        memoryCountBadge.classList.remove('hidden')
      } else {
        memoryCountBadge.classList.add('hidden')
      }

      if (memories.length === 0) {
        memoryList.innerHTML = `
          <div class="memory-empty">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4; margin-bottom:8px">
              <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
            </svg>
            <p>No memories yet.</p>
            <p style="font-size:12px; margin-top:4px;">Share personal info or preferences and Nexus will remember them.</p>
          </div>`
        return
      }

      memoryList.innerHTML = ''
      memories.forEach(m => {
        const item = document.createElement('div')
        item.className = 'memory-item'
        item.dataset.id = m.id

        const categoryColors = {
          preference: '#6366f1',
          habit:      '#f59e0b',
          personal:   '#10b981',
          goal:       '#ec4899',
          skill:      '#3b82f6',
          project:    '#14b8a6',
        }
        const color = categoryColors[m.category] ?? '#6b6b75'
        const lastUsed = m.last_used
          ? new Date(m.last_used).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
          : 'Never used'

        item.innerHTML = `
          <div class="memory-item-header">
            <span class="memory-badge" style="background: ${color}20; color: ${color}; border: 1px solid ${color}40">${m.category}</span>
            <span class="memory-date">${lastUsed}</span>
          </div>
          <p class="memory-content">${escapeHtml(m.content)}</p>
          ${m.context ? `<p class="memory-context">${escapeHtml(m.context)}</p>` : ''}
          <button class="memory-delete-btn" data-id="${m.id}" title="Delete this memory">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v6M14 11v6"></path>
              <path d="M9 6V4h6v2"></path>
            </svg>
            Delete
          </button>
        `
        memoryList.appendChild(item)
      })

      // Delete handlers
      memoryList.querySelectorAll('.memory-delete-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation()
          const id = Number(btn.dataset.id)
          const item = memoryList.querySelector(`.memory-item[data-id="${id}"]`)
          if (!item) return
          item.style.opacity = '0.4'
          try {
            await api.deleteMemory(id)
            item.classList.add('memory-item-removing')
            setTimeout(() => item.remove(), 250)
            // Re-count
            const remaining = memoryList.querySelectorAll('.memory-item').length - 1
            if (remaining <= 0) {
              renderMemoryList([])
            } else {
              memoryCountBadge.textContent = remaining
            }
          } catch {
            item.style.opacity = '1'
          }
        })
      })
    }

    function escapeHtml(str) {
      return (str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g, '&#039;')
    }

    function escapeRegExp(str) {
      return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
    }

    function highlightHtml(text, query) {
      const safeText = escapeHtml(text ?? '')
      const term = String(query ?? '').trim()
      if (!term) return safeText
      return safeText.replace(new RegExp(`(${escapeRegExp(term)})`, 'ig'), '<mark class="search-highlight">$1</mark>')
    }

    // ─── Update memory badge count (background, no panel open) ───────────────
    async function refreshMemoryCount() {
      try {
        const { memories } = await api.getMemory()
        if (memories.length > 0) {
          memoryCountBadge.textContent = memories.length
          memoryCountBadge.classList.remove('hidden')
        } else {
          memoryCountBadge.classList.add('hidden')
        }
      } catch {}
    }

    // ─── Real-time title update (from SSE done event) ─────────────────────────
    function applyTitleUpdate({ id, title }) {
      if (!title) return

      // Update header if this is the current conversation
      if (id === currentConversationId) {
        currentChatTitle.textContent = title
        currentChatTitle.classList.add('title-animating')
        setTimeout(() => currentChatTitle.classList.remove('title-animating'), 600)
      }

      // Update sidebar item in-place (no full reload needed)
      const items = convoList.querySelectorAll('.conversation-item')
      items.forEach(item => {
        if (item.dataset.convoId === String(id)) {
          const titleSpan = item.querySelector('.chat-title-wrapper span:last-child')
          if (titleSpan) {
            titleSpan.textContent = title
            titleSpan.classList.add('title-animating')
            setTimeout(() => titleSpan.classList.remove('title-animating'), 600)
          }
        }
      })
    }

    // ─── Message rendering ────────────────────────────────────────────────────
    function createBubble(role) {
      const div = document.createElement('div')
      div.className = `message ${role}`

      const avatar = document.createElement('div')
      avatar.className = 'message-avatar'
      avatar.textContent = role === 'user' ? 'U' : 'AI'

      const content = document.createElement('div')
      content.className = 'message-content'

      const label = document.createElement('span')
      label.className = 'role-label'
      label.textContent = role === 'user' ? 'You' : 'Nexus AI'

      const p = document.createElement('p')
      content.append(label, p)
      div.append(avatar, content)
      messagesEl.appendChild(div)
      return div
    }

    function appendMessage(role, content, messageId = null) {
      const div = createBubble(role)
      if (messageId !== null && messageId !== undefined) div.dataset.messageId = messageId
      div.querySelector('p').textContent = content
      messagesEl.scrollTop = messagesEl.scrollHeight
      return div
    }

    function appendHighlightedMessage(role, content, query, messageId = null) {
      const div = createBubble(role)
      if (messageId !== null && messageId !== undefined) div.dataset.messageId = messageId
      div.querySelector('p').innerHTML = highlightHtml(content, query)
      messagesEl.scrollTop = messagesEl.scrollHeight
      return div
    }

    function clearMessages() {
      messagesEl.innerHTML = ''
      messagesEl.appendChild(emptyHint)
    }

    function showEmptyState() {
      emptyHint.style.display = 'block'
      currentChatTitle.textContent = 'New Conversation'
    }

    function hideEmptyState() {
      emptyHint.style.display = 'none'
    }

    function showStats(meta) {
      statsBar.classList.remove('hidden')
      statsBar.innerHTML = `
        <span>Model: <strong>${meta.model ?? '-'}</strong></span> • 
        <span>Prompt: <strong>${meta.prompt_tokens ?? '-'}</strong></span> • 
        <span>Response: <strong>${meta.response_tokens ?? '-'}</strong></span> • 
        <span>Time: <strong>${meta.duration_ms ?? '-'} ms</strong></span>
      `
    }

    function setLoading(on) {
      sendBtn.disabled = on
      inputEl.style.opacity = on ? '0.6' : '1'
    }

    // ─── Conversation list rendering ──────────────────────────────────────────
    function renderConvoItem(c) {
      const item = document.createElement('div')
      item.className = 'conversation-item'
      item.dataset.convoId = c.id
      if (c.id === currentConversationId) {
        item.classList.add('active')
        currentChatTitle.textContent = c.title
      }

      item.onclick = () => loadConversation(c.id)

      const wrapper = document.createElement('div')
      wrapper.className = 'chat-title-wrapper'

      const icon = document.createElement('span')
      icon.innerHTML = c.pinned ? '📌' : '💬'
      icon.style.opacity = '0.7'
      icon.style.fontSize = '12px'

      const title = document.createElement('span')
      title.textContent = c.title

      wrapper.append(icon, title)

      const menuWrapper = document.createElement('div')
      menuWrapper.className = 'menu-wrapper'

      const menuBtn = document.createElement('button')
      menuBtn.className = 'menu-btn'
      menuBtn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
      `

      const dropdown = document.createElement('div')
      dropdown.className = 'dropdown hidden'

      const pinBtn = document.createElement('div')
      pinBtn.className = 'dropdown-item'
      pinBtn.textContent = c.pinned ? 'Unpin' : 'Pin'
      pinBtn.onclick = async (e) => {
        e.stopPropagation()
        await api.togglePin(c.id)
        await loadConversations()
      }

      const renameBtn = document.createElement('div')
      renameBtn.className = 'dropdown-item'
      renameBtn.textContent = 'Rename'
      renameBtn.onclick = async (e) => {
        e.stopPropagation()
        const newTitle = prompt('Enter new name:', c.title)
        if (!newTitle) return
        await api.renameConversation(c.id, newTitle)
        await loadConversations()
        if (c.id === currentConversationId) await loadConversation(c.id)
      }

      const deleteBtn = document.createElement('div')
      deleteBtn.className = 'dropdown-item delete'
      deleteBtn.textContent = 'Delete'
      deleteBtn.onclick = async (e) => {
        e.stopPropagation()
        if (confirm('Delete this conversation?')) {
          await deleteConversation(c.id)
        }
      }

      menuBtn.onclick = (e) => {
        e.stopPropagation()
        document.querySelectorAll('.dropdown').forEach(d => {
          if (d !== dropdown) d.classList.add('hidden')
        })
        dropdown.classList.toggle('hidden')
      }

      dropdown.append(pinBtn, renameBtn, deleteBtn)
      menuWrapper.append(menuBtn, dropdown)
      item.append(wrapper, menuWrapper)
      convoList.appendChild(item)
    }

    function renderSearchResult(c, query) {
      const item = document.createElement('div')
      item.className = 'conversation-item search-result-item'
      item.dataset.convoId = c.id
      if (c.id === currentConversationId) item.classList.add('active')

      item.onclick = () => loadConversation(c.id, {
        query,
        messageId: c.message_id,
        matchType: c.match_type,
      })

      const wrapper = document.createElement('div')
      wrapper.className = 'search-result-content'

      const top = document.createElement('div')
      top.className = 'search-result-title'
      top.innerHTML = highlightHtml(c.title, c.match_type === 'title' ? query : '')

      const meta = document.createElement('div')
      meta.className = 'search-result-meta'
      meta.textContent = c.match_type === 'title'
        ? 'Match in title'
        : `Match in ${c.message_role === 'user' ? 'your message' : 'Nexus reply'}`

      const snippet = document.createElement('div')
      snippet.className = 'search-result-snippet'
      snippet.innerHTML = highlightHtml(c.snippet, query)

      wrapper.append(top, meta, snippet)
      item.appendChild(wrapper)
      convoList.appendChild(item)
    }

    async function loadConversations() {
      const convos = await api.conversations()
      convoList.innerHTML = ''

      const pinned   = convos.filter(c => c.pinned)
      const unpinned = convos.filter(c => !c.pinned)

      if (pinned.length > 0) {
        const lbl = document.createElement('div')
        lbl.className = 'sidebar-label'; lbl.textContent = 'Pinned'
        convoList.appendChild(lbl)
        pinned.forEach(c => renderConvoItem(c))
      }

      if (unpinned.length > 0) {
        const lbl = document.createElement('div')
        lbl.className = 'sidebar-label'; lbl.textContent = 'Recent'
        convoList.appendChild(lbl)
        unpinned.forEach(c => renderConvoItem(c))
      }

      return convos
    }

    async function searchConversations(query) {
      convoList.innerHTML = ''

      const lbl = document.createElement('div')
      lbl.className = 'sidebar-label'
      lbl.textContent = `Search results`
      convoList.appendChild(lbl)

      try {
        const results = await api.searchConversations(query)
        if (!results.length) {
          const empty = document.createElement('div')
          empty.className = 'search-empty'
          empty.textContent = 'No matching chats'
          convoList.appendChild(empty)
          return
        }
        results.forEach(c => renderSearchResult(c, query))
      } catch {
        const empty = document.createElement('div')
        empty.className = 'search-empty'
        empty.textContent = 'Search failed'
        convoList.appendChild(empty)
      }
    }

    async function loadConversation(id, match = null) {
      const data = await api.getConversation(id)
      currentConversationId = id
      currentChatTitle.textContent = data.title

      clearMessages()
      statsBar.classList.add('hidden')

      if (!data.messages.length) {
        showEmptyState()
      } else {
        hideEmptyState()
        data.messages.forEach(m => {
          if (match?.query && m.id === match.messageId) {
            appendHighlightedMessage(m.role, m.content, match.query, m.id)
          } else {
            appendMessage(m.role, m.content, m.id)
          }
        })
      }

      if (activeSearchQuery) {
        await searchConversations(activeSearchQuery)
      } else {
        await loadConversations()
      }

      if (match?.matchType === 'title') {
        currentChatTitle.innerHTML = highlightHtml(data.title, match.query)
      }

      if (match?.query) {
        requestAnimationFrame(() => {
          const target = match.messageId
            ? messagesEl.querySelector(`.message[data-message-id="${match.messageId}"]`)
            : messagesEl.querySelector('.search-highlight')
          const scrollTarget = target ?? messagesEl.querySelector('.search-highlight')
          scrollTarget?.scrollIntoView({ behavior: 'smooth', block: 'center' })
        })
      }
    }

    async function createNewConversation() {
      const convo = await api.createConversation('New Chat')
      currentConversationId = convo.id
      searchEl.value = ''
      activeSearchQuery = ''
      clearMessages()
      showEmptyState()
      await loadConversations()
    }

    async function deleteConversation(id) {
      await api.deleteConversation(id)

      if (currentConversationId === id) {
        currentConversationId = null
        clearMessages()
        showEmptyState()
      }

      const convos = await loadConversations()
      if (convos.length > 0 && !currentConversationId) {
        await loadConversation(convos[0].id)
      }
    }

    // ─── Send message ─────────────────────────────────────────────────────────
    async function sendMessage() {
      const text = inputEl.value.trim()
      if (!text || sendBtn.disabled) return

      if (!currentConversationId) {
        const convo = await api.createConversation('New Chat')
        currentConversationId = convo.id
        await loadConversations()
      }

      hideEmptyState()
      inputEl.value = ''
      inputEl.style.height = 'auto'
      setLoading(true)
      inputEl.disabled = true
      inputEl.focus()

      appendMessage('user', text)

      const bubble = createBubble('assistant')
      const contentEl = bubble.querySelector('p')
      contentEl.innerHTML = `<span class="typing"></span>`
      let fullReply = ''

      try {
        await api.chatStream({
          conversation_id: currentConversationId,
          message: text,
          onToken(token) {
            fullReply += token
            contentEl.textContent = fullReply
            messagesEl.scrollTop = messagesEl.scrollHeight
          },
          onDone(meta) {
            showStats(meta)
            setLoading(false)
            inputEl.disabled = false
            inputEl.focus()
            // Refresh sidebar immediately (shows latest message order)
            if (activeSearchQuery) {
              searchConversations(activeSearchQuery).catch(() => {})
            } else {
              loadConversations().catch(() => {})
            }
            refreshMemoryCount()
          },
          onTitleUpdate(update) {
            // Real-time title push — arrives a few seconds after onDone
            applyTitleUpdate(update)
          },
          onMemoryUpdate() {
            refreshMemoryCount()
            if (!memoryPanel.classList.contains('hidden')) {
              loadMemoryPanel()
            }
          },
          onError(err) {
            contentEl.textContent = err
            setLoading(false)
            inputEl.disabled = false
            inputEl.focus()
          }
        })

        refreshMemoryCount()

        // loadConversations already called in onDone above — no need to repeat
      } catch (err) {
        contentEl.textContent = err.message
        setLoading(false)
        inputEl.disabled = false
        inputEl.focus()
      }
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      const convos = await loadConversations()

      if (convos.length > 0) {
        await loadConversation(convos[0].id)
      } else {
        showEmptyState()
      }

      // Load initial memory badge count
      refreshMemoryCount()
    }

    init()
  </script>
</body>
</html>
